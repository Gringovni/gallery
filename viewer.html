<!doctype html>
<html lang="en" class="viewer-page">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>View image • Latent Illumination</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Viewer page: white canvas so safe-area gutters are white on first paint (Chrome iOS landscape) */
    html.viewer-page,
    body.viewer-page {
      background: var(--bg);
    }
    .viewer-wrap {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      box-sizing: border-box;
    }
    .viewer-close {
      position: fixed;
      top: calc(8px + env(safe-area-inset-top));
      right: calc(18px + env(safe-area-inset-right));
      z-index: 100;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #444;
      text-decoration: none;
      background: transparent;
      border: none;
      cursor: pointer;
      font-family: Arial, sans-serif;
      line-height: 1;
    }
    .viewer-close:hover { opacity: 1; }
    .viewer-image {
      max-width: 100%;
      max-height: calc(100dvh - 80px);
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
    }
    .viewer-loading {
      color: var(--muted);
      font-family: "Source Serif 4", Georgia, serif;
      font-size: 14px;
    }
  </style>
</head>
<body class="viewer-page">
  <a href="#" id="viewerClose" class="viewer-close" aria-label="Close">×</a>
  <main class="viewer-wrap" id="viewerWrap">
    <p class="viewer-loading" id="viewerLoading">Loading…</p>
    <img id="viewerImage" class="viewer-image" alt="" style="display: none;" />
  </main>
  <script>
    (function() {
      const params = new URLSearchParams(location.search);
      const index = parseInt(params.get("i"), 10);
      const wrap = document.getElementById("viewerWrap");
      const loading = document.getElementById("viewerLoading");
      const img = document.getElementById("viewerImage");
      const closeBtn = document.getElementById("viewerClose");

      if (!Number.isFinite(index) || index < 0) {
        loading.textContent = "Invalid image.";
        return;
      }

      closeBtn.addEventListener("click", function(e) {
        e.preventDefault();
        if (document.referrer && document.referrer.indexOf(location.host) !== -1) {
          history.back();
        } else {
          location.href = "/";
        }
      });

      fetch("gallery.json?v=" + Date.now(), { cache: "no-store" })
        .then(function(r) { return r.ok ? r.json() : Promise.reject(new Error("Failed to load gallery")); })
        .then(function(items) {
          if (!items || !items[index]) {
            loading.textContent = "Image not found.";
            return;
          }
          const item = items[index];
          img.src = item.src || item.thumb || "";
          img.alt = item.title || "Image";
          img.style.display = "block";
          loading.style.display = "none";
        })
        .catch(function() {
          loading.textContent = "Could not load image.";
        });
    })();
  </script>
</body>
</html>
